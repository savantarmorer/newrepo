};

const WIKI_MAP = {"pacheco":"Rodrigo_Pacheco","silveira":"Alexandre_Silveira","greyce":"Greyce_Elias","kallas":"Lucas_Kallas"};
const nodeImages = {};

function avatarForName(name){
  return 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=111827&color=ffffff&size=128&bold=true&format=png';
}

async function fetchWikiImages() {
  const ids = Object.keys(WIKI_MAP);
  const titles = ids.map(id => WIKI_MAP[id]).join('|');
  try {
    const url = 'https://pt.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(titles) + '&prop=pageimages&format=json&pithumbsize=80&origin=*';
    const resp = await fetch(url);
    const data = await resp.json();
    const pages = data.query.pages;
    const rev = {};
    ids.forEach(id => { rev[WIKI_MAP[id].replace(/_/g,' ').toLowerCase()] = id; });
    Object.values(pages).forEach(page => {
      if(page.thumbnail && page.thumbnail.source) {
        const title = page.title.toLowerCase();
        let nodeId = rev[title];
        if(!nodeId) ids.forEach(id => { if(WIKI_MAP[id].replace(/_/g,' ').toLowerCase()===title) nodeId=id; });
        if(nodeId) nodeImages[nodeId] = page.thumbnail.source;
      }
    });
    applyNodeImages();
  } catch(e) { fetchWikiImagesEN(); }
}

async function fetchWikiImagesEN() {
  const ids = Object.keys(WIKI_MAP);
  const titles = ids.map(id => WIKI_MAP[id]).join('|');
  try {
    const url = 'https://en.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(titles) + '&prop=pageimages&format=json&pithumbsize=80&origin=*';
    const resp = await fetch(url);
    const data = await resp.json();
    const pages = data.query.pages;
    const rev = {};
    ids.forEach(id => { rev[WIKI_MAP[id].replace(/_/g,' ').toLowerCase()] = id; });
    Object.values(pages).forEach(page => {
      if(page.thumbnail && page.thumbnail.source) {
        const title = page.title.toLowerCase();
        let nodeId = rev[title];
        if(!nodeId) ids.forEach(id => { if(WIKI_MAP[id].replace(/_/g,' ').toLowerCase()===title) nodeId=id; });
        if(nodeId && !nodeImages[nodeId]) nodeImages[nodeId] = page.thumbnail.source;
      }
    });
    applyNodeImages();
  } catch(e) { console.warn('Wiki fetch failed', e); }
}

function applyNodeImages() {
  if(!window._nodeSel) return;
  const defs = d3.select('#svg defs');
  window._nodeSel.each(function(d) {
    const img = nodeImages[d.id];
    if(!img) return;
    const r = (TYPES[d.type]?.r || 18);
    const clipId = 'clip-' + d.id;
    if(defs.select('#'+clipId).empty()) {
      defs.append('clipPath').attr('id',clipId)
        .append('circle').attr('r',r-1.5).attr('cx',0).attr('cy',0);
    }
    const g = d3.select(this);
    if(g.select('.node-img').empty()) {
      g.append('image')
        .attr('class','node-img')
        .attr('href',img)
        .attr('x',-(r-1.5)).attr('y',-(r-1.5))
        .attr('width',(r-1.5)*2).attr('height',(r-1.5)*2)
        .attr('clip-path','url(#'+clipId+')')
        .attr('preserveAspectRatio','xMidYMid slice')
        .attr('opacity',0)
        .transition().duration(600)
        .attr('opacity',0.82);
      g.select('.node-center-dot').attr('opacity',0);
    }
  });
}

let showL2=true, showL3=false, selectedId=null;
let showEdgeLabels=false, hideIsolated=false;
let activeTypes=new Set(Object.keys(TYPES));
let pathFrom=null, pathTo=null, pathSet=null;
let simulation, svgSel, zoomBehavior;

function getVisibleNodesBase(){
  if(showL3) return rawNodes;
  if(showL2) return rawNodes.filter(n=>n.layer<=2);
  return rawNodes.filter(n=>n.layer===1);
}
function getVisibleGraph(){
  let vn=getVisibleNodesBase().filter(n=>activeTypes.has(n.type));
  const ids0=new Set(vn.map(n=>n.id));
  let ve=rawEdges.filter(e=>ids0.has(e.s)&&ids0.has(e.t));
  if(hideIsolated){
    const deg=new Map();
    ve.forEach(e=>{deg.set(e.s,(deg.get(e.s)||0)+1);deg.set(e.t,(deg.get(e.t)||0)+1);});
    vn=vn.filter(n=>(deg.get(n.id)||0)>0);
    const ids=new Set(vn.map(n=>n.id));
    ve=ve.filter(e=>ids.has(e.s)&&ids.has(e.t));
  }
  return {vn,ve};
}
function typeCounts(){ const c={}; rawNodes.forEach(n=>{c[n.type]=(c[n.type]||0)+1;}); return c; }

function init(){
  svgSel=d3.select('#svg');
  zoomBehavior=d3.zoom().scaleExtent([0.08,5]).on('zoom',e=>{
    d3.select('#g-edges').attr('transform',e.transform);
    d3.select('#g-nodes').attr('transform',e.transform);
  });
  svgSel.call(zoomBehavior);
  svgSel.on('click',()=>{selectedId=null;clearPath();update();closePanel();hideTooltip();if(isMobile())hideLegend();});
  buildLegend(); buildGraph(); window.setTimeout(resetView,800); bindKeys();
  if(isMobile()) hideLegend(); else showLegend();
  fetchWikiImages();
}

function buildGraph(){
  const {vn,ve}=getVisibleGraph();
  const w=window.innerWidth, h=window.innerHeight-56;
  if(simulation) simulation.stop();
  const prevPos={};
  if(window._simNodes) window._simNodes.forEach(n=>{prevPos[n.id]={x:n.x,y:n.y};});
  const nodes=vn.map(n=>({...n,x:prevPos[n.id]?.x||w/2+(Math.random()-.5)*300,y:prevPos[n.id]?.y||h/2+(Math.random()-.5)*300}));
  const edges=ve.map(e=>({...e,source:e.s,target:e.t}));
  simulation=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(d=>{
      if(d.source.type==='center'||d.target.type==='center') return 180;
      if(d.source.layer===1&&d.target.layer===1) return 130;
      if(d.source.type==='fachada'||d.target.type==='fachada') return 100;
      return 165;
    }).strength(d=>0.25+d.w*0.05))
    .force('charge',d3.forceManyBody().strength(d=>d.type==='center'?-1500:d.type==='fachada'?-200:d.layer===1?-700:d.layer===2?-400:-250))
    .force('center',d3.forceCenter(w/2,h/2).strength(0.04))
    .force('collision',d3.forceCollide().radius(d=>(TYPES[d.type]?.r||18)+30).strength(0.8))
    .alphaDecay(0.02);

  window._simNodes=nodes; window._simEdges=edges;
  const gE=d3.select('#g-edges'); gE.selectAll('*').remove();
  const edgeSel=gE.selectAll('line').data(edges).join('line').attr('stroke','#ffffff').attr('stroke-opacity',0.07).attr('stroke-width',d=>Math.max(0.3,d.w*0.3));
  const edgeLabelSel=gE.selectAll('text').data(edges).join('text').attr('fill','#1a1a1a').attr('font-size','10').attr('font-family','IBM Plex Sans,monospace').attr('text-anchor','middle').attr('pointer-events','none').text(d=>d.rel.length>38?d.rel.slice(0,38)+'…':d.rel);

  const gN=d3.select('#g-nodes'); gN.selectAll('*').remove();
  const nodeSel=gN.selectAll('g.node').data(nodes,d=>d.id).join('g')
    .attr('class','node').style('cursor','pointer')
    .on('click',(e,d)=>{
      e.stopPropagation();
      if(e.altKey){pathTo=d.id;recomputePath();return;}
      if(e.shiftKey){pathFrom=d.id;recomputePath();return;}
      selectNode(d.id); if(isMobile()) hideLegend();
    })
    .on('mousemove',(e,d)=>showTooltip(e,d))
    .on('mouseleave',()=>hideTooltip())
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

  nodeSel.append('circle').attr('class','glow-ring').attr('r',d=>(TYPES[d.type]?.r||18)+10).attr('fill',d=>TYPES[d.type]?.color||'#fff').attr('opacity',0.06);
  nodeSel.append('circle').attr('class','node-circle').attr('r',d=>TYPES[d.type]?.r||18).attr('fill','#05050e').attr('stroke',d=>TYPES[d.type]?.color||'#fff').attr('stroke-width',d=>d.type==='center'?2.5:1.2);
  nodeSel.filter(d=>d.type==='center').append('circle').attr('r',54).attr('fill','none').attr('stroke','#dc2626').attr('stroke-width',0.8).attr('opacity',0.25);
  nodeSel.filter(d=>d.type==='center').append('circle').attr('r',74).attr('fill','none').attr('stroke','#dc2626').attr('stroke-width',0.5).attr('opacity',0.1);
  nodeSel.append('circle').attr('class','node-center-dot').attr('r',d=>d.type==='center'?4:2.5).attr('fill',d=>TYPES[d.type]?.color||'#fff').attr('opacity',0.85);
  nodeSel.append('text').attr('class','lbl-main').attr('y',d=>(TYPES[d.type]?.r||18)+14).attr('text-anchor','middle').attr('fill','#b0bbc9').attr('font-size',d=>d.type==='center'?12:d.type==='fachada'?9:11).attr('font-weight',d=>d.layer===1?'600':'400').attr('font-family','IBM Plex Sans,sans-serif').attr('pointer-events','none').text(d=>d.label);
  nodeSel.append('text').attr('class','lbl-sub').attr('y',d=>(TYPES[d.type]?.r||18)+28).attr('text-anchor','middle').attr('fill',d=>TYPES[d.type]?.color||'#fff').attr('font-size','9.5').attr('font-family','IBM Plex Sans,sans-serif').attr('opacity',0.6).attr('pointer-events','none').text(d=>d.sub.length>48?d.sub.slice(0,48)+'…':d.sub);

  let tickCount=0;
  simulation.on('tick',()=>{
    tickCount++;
    edgeSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    edgeLabelSel.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-3);
    nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
    if(tickCount>260&&simulation.alpha()<0.12) simulation.stop();
  });

  window._nodeSel=nodeSel; window._edgeSel=edgeSel; window._edgeLabelSel=edgeLabelSel;
  document.getElementById('stats').textContent=nodes.length+' NOS  ·  '+edges.length+' CONEXOES'+(pathFrom||pathTo?'  ·  CAMINHO: '+(pathFrom||'—')+' → '+(pathTo||'—'):'');
  update();
  setTimeout(applyNodeImages,100);
}

function selectNode(id){selectedId=id;update();showPanel(id);}
function update(){
  if(!window._nodeSel) return;
  const connIds=new Set();
  if(selectedId){ window._simEdges.forEach(e=>{ if(e.source.id===selectedId||e.target.id===selectedId){connIds.add(e.source.id);connIds.add(e.target.id);} }); }
  const cfg=id=>TYPES[rawNodes.find(n=>n.id===id)?.type]||{color:'#fff'};
  const inPN=id=>pathSet?.nodes?.has(id);
  const inPE=(a,b)=>pathSet?.edges?.has(edgeKey(a,b));

  window._nodeSel.select('.node-circle').attr('fill',d=>{if(inPN(d.id)) return cfg(d.id).color;if(!selectedId) return '#05050e';return d.id===selectedId?cfg(d.id).color:connIds.has(d.id)?cfg(d.id).color+'18':'#05050e';}).attr('opacity',d=>{if(inPN(d.id)) return 1;return !selectedId?1:connIds.has(d.id)?1:0.12;});
  window._nodeSel.select('.glow-ring').attr('opacity',d=>{if(inPN(d.id)) return 0.22;return !selectedId?0.06:d.id===selectedId?0.28:connIds.has(d.id)?0.12:0.01;});
  window._nodeSel.select('.lbl-main').attr('fill',d=>!selectedId?'#b0bbc9':d.id===selectedId?'#fff':connIds.has(d.id)?'#e5e7eb':'#1e2030');
  window._nodeSel.select('.lbl-sub').attr('opacity',d=>!selectedId?0.55:connIds.has(d.id)?0.8:0.05);
  window._nodeSel.select('.node-img').attr('opacity',d=>{const base=0.82;if(!selectedId) return base;return connIds.has(d.id)?base:0.1;});

  const sc=selectedId?cfg(selectedId).color:'#fff';
  window._edgeSel.attr('stroke',d=>!selectedId?'#fff':inPE(d.source.id,d.target.id)?sc:(d.source.id===selectedId||d.target.id===selectedId)?sc:'#fff')
    .attr('stroke-opacity',d=>!selectedId?0.07:inPE(d.source.id,d.target.id)?0.85:(d.source.id===selectedId||d.target.id===selectedId)?0.75:0.01)
    .attr('stroke-width',d=>!selectedId?Math.max(0.3,d.w*0.3):inPE(d.source.id,d.target.id)?Math.max(2.2,d.w*0.6):(d.source.id===selectedId||d.target.id===selectedId)?Math.max(1.2,d.w*0.5):0.2);
  window._edgeLabelSel.attr('fill',d=>{const os=selectedId&&(d.source.id===selectedId||d.target.id===selectedId);const op=inPE(d.source.id,d.target.id);if(showEdgeLabels||os||op) return op?'#cbd5e1':os?'#9ca3af':'#4b5563';return '#08080e';}).attr('opacity',d=>{const os=selectedId&&(d.source.id===selectedId||d.target.id===selectedId);const op=inPE(d.source.id,d.target.id);if(showEdgeLabels||os||op) return op?0.95:os?0.8:0.22;return 0;});
}

function showPanel(id){
  const node=rawNodes.find(n=>n.id===id);if(!node) return;
  const cfg=TYPES[node.type]||{color:'#fff',label:'?'};
  document.getElementById('panel-type').textContent=cfg.label.toUpperCase();
  document.getElementById('panel-type').style.color=cfg.color;
  document.getElementById('panel-name').textContent=node.label;
  document.getElementById('panel-sub').textContent=node.sub;
  const list=document.getElementById('conn-list');list.innerHTML='';
  rawEdges.filter(e=>e.s===id||e.t===id).forEach(e=>{
    const othId=e.s===id?e.t:e.s;
    const oth=rawNodes.find(n=>n.id===othId);if(!oth) return;
    const ocfg=TYPES[oth.type]||{color:'#fff'};
    const d=document.createElement('div');d.className='conn-item';
    d.innerHTML='<div class="conn-dot" style="background:'+ocfg.color+'"></div><div><div class="conn-name">'+oth.label+'</div><div class="conn-rel">'+e.rel+'</div></div>';
    d.onclick=ev=>{ev.stopPropagation();selectNode(othId);};
    list.appendChild(d);
  });
  const p=document.getElementById('panel');
  p.style.borderLeft='3px solid '+cfg.color;
  p.style.boxShadow='0 0 40px '+cfg.color+'14,0 20px 60px rgba(0,0,0,0.6)';
  p.classList.add('show');
}
function closePanel(){document.getElementById('panel').classList.remove('show');selectedId=null;update();}

function buildLegend(){
  const leg=document.getElementById('legend');const counts=typeCounts();
  leg.innerHTML='<div id="leg-title">GRUPOS</div>';
  Object.entries(TYPES).forEach(([type,cfg])=>{
    const d=document.createElement('div');d.className='leg-item';
    d.innerHTML='<div class="leg-dot" style="background:'+cfg.color+';box-shadow:0 0 6px '+(cfg.glow||cfg.color)+'44"></div><span class="leg-label">'+cfg.label+'</span><span class="leg-count">'+(counts[type]||0)+'</span>';
    d.onclick=ev=>{ev.stopPropagation();toggleType(type);};
    leg.appendChild(d);
  });
  syncLegendState();
}

function toggleL2(){showL2=!showL2;document.getElementById('btn-l2').classList.toggle('on',showL2);buildGraph();}
function toggleL3(){showL3=!showL3;if(showL3)showL2=true;document.getElementById('btn-l3').classList.toggle('on',showL3);document.getElementById('btn-l2').classList.toggle('on',showL2);buildGraph();}
function resetView(){const w=window.innerWidth,h=window.innerHeight;svgSel.transition().duration(650).call(zoomBehavior.transform,d3.zoomIdentity.translate(w*0.1,h*0.07).scale(isMobile()?0.62:0.72));}
function fitView(){
  if(!window._simNodes?.length) return resetView();
  const ns=window._simNodes;
  const xs=ns.map(n=>n.x),ys=ns.map(n=>n.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const pad=isMobile()?170:140,w=window.innerWidth,h=window.innerHeight;
  const s=Math.max(0.10,Math.min(3.2,Math.min(w/(maxX-minX+pad),h/(maxY-minY+pad))));
  svgSel.transition().duration(600).call(zoomBehavior.transform,d3.zoomIdentity.translate(w/2-((minX+maxX)/2)*s,h/2-((minY+maxY)/2)*s).scale(s));
}
function searchNode(val){
  if(!window._nodeSel) return;
  if(!val){window._nodeSel.select('.node-circle').attr('stroke-width',d=>d.type==='center'?2.5:1.2);return;}
  const v=val.toLowerCase();
  window._nodeSel.select('.node-circle').attr('stroke-width',d=>(d.label.toLowerCase().includes(v)||d.sub.toLowerCase().includes(v))?5:d.type==='center'?2.5:1.2);
}
function toggleEdgeLabels(){showEdgeLabels=!showEdgeLabels;document.getElementById('btn-labels').classList.toggle('on',showEdgeLabels);update();}
function toggleIsolated(){hideIsolated=!hideIsolated;document.getElementById('btn-isolated').classList.toggle('on',hideIsolated);buildGraph();}
function toggleType(type){ if(activeTypes.has(type)) activeTypes.delete(type); else activeTypes.add(type); if(activeTypes.size===0) activeTypes=new Set(Object.keys(TYPES)); syncLegendState(); buildGraph(); }
function syncLegendState(){ const items=[...document.querySelectorAll('#legend .leg-item')]; items.forEach((el,i)=>{const type=Object.keys(TYPES)[i];el.classList.toggle('off',!activeTypes.has(type));}); }
function edgeKey(a,b){return a<b?a+'->'+b:b+'->'+a;}
function recomputePath(){
  if(!pathFrom&&!pathTo){pathSet=null;buildGraph();return;}
  if(!pathFrom||!pathTo){pathSet=null;update();return;}
  const {vn,ve}=getVisibleGraph();
  const ids=new Set(vn.map(n=>n.id));
  if(!ids.has(pathFrom)||!ids.has(pathTo)){pathSet=null;update();return;}
  const adj=new Map(); vn.forEach(n=>adj.set(n.id,[])); ve.forEach(e=>{adj.get(e.s).push(e.t);adj.get(e.t).push(e.s);});
  const q=[pathFrom],prev=new Map([[pathFrom,null]]);
  while(q.length){const cur=q.shift();if(cur===pathTo) break;for(const nx of adj.get(cur)||[]){if(prev.has(nx)) continue;prev.set(nx,cur);q.push(nx);}}
  if(!prev.has(pathTo)){pathSet={nodes:new Set([pathFrom,pathTo]),edges:new Set()};update();return;}
  const nodesSet=new Set(),edgesSet=new Set(); let cur=pathTo;
  while(cur){nodesSet.add(cur);const p=prev.get(cur);if(p) edgesSet.add(edgeKey(cur,p));cur=p;}
  pathSet={nodes:nodesSet,edges:edgesSet};update();
}
function clearPath(){pathFrom=null;pathTo=null;pathSet=null;}
function showTooltip(ev,node){
  const tt=document.getElementById('tooltip');
  const cfg=TYPES[node.type]||{label:'',color:'#fff'};
  tt.querySelector('.t1').textContent=node.label;
  tt.querySelector('.t2').textContent=node.sub;
  tt.querySelector('.t3').textContent=cfg.label.toUpperCase()+' · CAMADA '+node.layer+(pathFrom||pathTo?' · CAMINHO: '+(pathFrom||'—')+' → '+(pathTo||'—'):'');
  tt.style.left=Math.min(ev.clientX+16,window.innerWidth-340)+'px';
  tt.style.top=Math.min(ev.clientY+16,window.innerHeight-100)+'px';
  tt.style.display='block';
}
function hideTooltip(){document.getElementById('tooltip').style.display='none';}
function bindKeys(){ window.addEventListener('keydown',e=>{ if(e.key=='/'){e.preventDefault();document.getElementById('srch')?.focus();} if(e.key==='Escape'){closePanel();selectedId=null;clearPath();const s=document.getElementById('srch');if(s)s.value='';searchNode('');update();hideTooltip();if(isMobile())hideLegend();} if(e.key==='f'||e.key==='F') fitView(); if(e.key==='l'||e.key==='L') toggleEdgeLabels(); }); }
function isMobile(){return window.matchMedia&&window.matchMedia('(max-width:768px)').matches;}
function toggleLegend(){document.getElementById('legend').classList.toggle('show');}
function showLegend(){document.getElementById('legend').classList.add('show');}
function hideLegend(){document.getElementById('legend').classList.remove('show');}

window.toggleL2=toggleL2; window.toggleL3=toggleL3;
window.resetView=resetView; window.fitView=fitView;
window.searchNode=searchNode; window.closePanel=closePanel;
window.toggleEdgeLabels=toggleEdgeLabels; window.toggleIsolated=toggleIsolated;
window.toggleLegend=toggleLegend;

window.addEventListener('resize',()=>{if(simulation)simulation.force('center',d3.forceCenter(window.innerWidth/2,(window.innerHeight-56)/2)).restart();});
init();
</script>
</body>
